<!DOCTYPE html>
<html>
<head>

<title>ZryoX Sticker Viewer</title>

<style>

body{
background:#ffffff;
color:#000000;
font-family:sans-serif;
margin:0;
}

header{
padding:30px;
border-bottom:1px solid #ddd;
}

.badge{
background:#000;
color:#fff;
padding:5px 10px;
font-weight:bold;
display:inline-block;
}

.name{
font-size:30px;
font-weight:bold;
margin-top:10px;
}

.count{
margin-top:5px;
color:#555;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fill,180px);
gap:15px;
padding:20px;
}

.empty{
opacity:0.6;
padding:40px;
text-align:center;
font-size:18px;
}

.card{
background:#f5f5f5;
border-radius:10px;
padding:5px;
}

img{
width:100%;
}

button{
background:#000;
color:white;
border:none;
padding:5px;
width:100%;
}

</style>

</head>

<body>

<header>

<div class="badge">ZryoX</div>

<div class="name">
No Stickers Yet
</div>

<div class="count">
0 stickers
</div>

</header>

<div class="grid" id="grid"></div>

<script>

let stickers = [];

let grid = document.getElementById("grid");

async function loadStickers(){

let res = await fetch("/api/save");
let data = await res.json();

stickers = data.stickers || [];

render();

}

function render(){

grid.innerHTML = "";

if(stickers.length == 0){

grid.innerHTML = "<div class='empty'>No stickers sent yet</div>";

return;

}

stickers.forEach(function(url){

let card = document.createElement("div");
card.className = "card";

let img = document.createElement("img");
img.src = url;

let btn = document.createElement("button");
btn.innerText = "COPY";

btn.onclick = function(){
navigator.clipboard.writeText(url);
};

card.appendChild(img);
card.appendChild(btn);

grid.appendChild(card);

});

}

loadStickers();

</script>

</body>
</html>
